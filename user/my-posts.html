<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="nav">
    <h3>My Posts</h3>
</div>

<div class="container" id="myPosts"></div>

<script src="../js/app.js"></script>
<script>
async function loadMyPosts() {
    const res = await fetch("http://localhost:8080/api/v1/posts/my", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const posts = await res.json();
    const box = document.getElementById("myPosts");

    posts.forEach(p => {
        box.innerHTML += `
        <div class="card">
            <h3>${p.title}</h3>
            <p>${p.content}</p>

            <button onclick="deletePost(${p.id})">Delete</button>
        </div>
        `;
    });
}

loadMyPosts();
</script>

<script src="../js/app.js"></script>
</body>
</html>
